MEMORY {
    ZP:         start = $0000, size = $0100, type = rw;
    RAM:        start = $0200, size = $7E00, type = rw, file = "";
    DUMMY_ROM:  start = $8000, size = $4000, type = ro, fill = yes, file = %O;
    ROM:        start = $C000, size = $3FFA, type = ro, fill = yes, file = %O;
    VECTOR:     start = $FFFA, size = 6    , type = ro, fill = yes, file = %O;
}

SEGMENTS{
    ZEROPAGE:   load = ZP, type = zp;
    RAM:        load = RAM, type = rw;
    RESET:      load = ROM, type = ro;
    SHELL:      load = ROM, type = ro;
    KERNEL:     load = ROM, type = ro;
    FONT:       load = ROM, type = ro;
    VECTOR:     load = VECTOR, type = ro;
}